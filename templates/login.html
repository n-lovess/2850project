<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AirGo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="navbar">
        <div class="nav-inner">
            <a href="{{ url_for('home') }}" class="nav-logo">AirGo</a>
            <div class="nav-links">
                <a href="{{ url_for('home') }}">Search Flights</a>
                <a href="{{ url_for('signup') }}">Sign Up</a>
            </div>
        </div>
    </div>

    <div class="container narrow-container">
        <div class="card auth-card">
            <h1>Login</h1>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="flash-message">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" class="auth-form">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>

                <button type="submit" class="btn full-btn">Login</button>
            </form>

            <p class="auth-switch">Don’t have an account? <a href="{{ url_for('signup') }}">Create one</a></p>
            <p class="auth-switch"><a href="{{ url_for('forgot_password') }}">Forgot password?</a></p>
        </div>
    </div>
</body>
</html>
